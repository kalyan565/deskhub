<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskHub Tickets</title>

    <link rel="stylesheet" href="./styles/main.css">
</head>

<body data-page="tickets-list">

    <h1>Tickets</h1>

    <div id="loading">
        Loading tickets...
    </div>

    <div id="error"></div>

    <div id="empty-state"></div>

    <button id="new-ticket-btn">
    New Ticket
</button>

<div class="toolbar">

    <input
        type="text"
        id="search-input"
        placeholder="Search tickets..."
    >

    <select id="status-filter">
        <option value="">All Statuses</option>
        <option value="open">Open</option>
        <option value="in-progress">In Progress</option>
        <option value="resolved">Resolved</option>
        <option value="closed">Closed</option>
    </select>

    <select id="priority-filter">
        <option value="">All Priorities</option>
        <option value="urgent">Urgent</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
    </select>

   

</div>    


    <table id="tickets-table">

        <thead>
            <tr>
                <th id="sort-id">
    ID <span id="id-arrow">↕</span>
</th>

<th>Title</th>

<th>Customer</th>

<th id="sort-priority">
    Priority <span id="priority-arrow">↕</span>
</th>

<th id="sort-status">
    Status <span id="status-arrow">↕</span>
</th>

<th>Assignee</th>

<th id="sort-created">
    Created <span id="created-arrow">↕</span>
</th>
            </tr>
        </thead>

        <tbody id="tickets-body">

        </tbody>

    </table>
    <div id="pagination">

    <button id="prev-btn">
        Previous
    </button>

    <span id="page-info">
        Page 1
    </span>

    <button id="next-btn">
        Next
    </button>

</div>

<div
    id="ticket-modal"
    style="display:none;"
>

    <h2>
        Create Ticket
    </h2>

    <form id="ticket-form">

        <input
            type="text"
            id="title"
            placeholder="Title"
        >
        <span id="title-error" class="error"></span>

        <input
            type="text"
            id="customer-name"
            placeholder="Customer Name"
        >
        <span id="customer-name-error" class="error"></span>

        <input
            type="email"
            id="customer-email"
            placeholder="Customer Email"
        >
        <span id="customer-email-error" class="error"></span>

        <textarea
            id="description"
            placeholder="Description"
        ></textarea>
        <span id="description-error" class="error"></span>

        <button type="submit">
            Create
        </button>

    </form>

</div>

    <script type="module" src="./src/main.js"></script>

</body>
</html>
