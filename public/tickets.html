<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskHub Tickets</title>

    <link rel="stylesheet" href="./styles/main.css">
</head>

<body data-page="tickets-list">

    <h1>Tickets</h1>

    <div id="loading">
        Loading tickets...
    </div>

    <div id="error"></div>

    <div id="empty-state"></div>

    <table id="tickets-table">

        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Customer</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Assignee</th>
                <th>Created</th>
            </tr>
        </thead>

        <tbody id="tickets-body">

        </tbody>

    </table>

    <script type="module" src="./src/main.js"></script>

</body>
</html>
