<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — DeskHub</title>
    <link rel="stylesheet" href="./styles/main.css">
</head>

<body data-page="dashboard" class="page">

    <header class="page-header">
        <h1>Dashboard</h1>
        <nav class="nav-links">
            <a href="tickets.html">Tickets</a>
            <button type="button" id="logout-btn" class="btn-secondary btn-inline">
                Log out
            </button>
        </nav>
    </header>

    <div id="stats-container">
        <div class="card">
            <h3>Total</h3>
            <p id="total-count">0</p>
        </div>
        <div class="card">
            <h3>Open</h3>
            <p id="open-count">0</p>
        </div>
        <div class="card">
            <h3>In progress</h3>
            <p id="progress-count">0</p>
        </div>
        <div class="card">
            <h3>Resolved</h3>
            <p id="resolved-count">0</p>
        </div>
    </div>

    <h2>Recent tickets</h2>
    <div id="recent-tickets"></div>

    <script type="module" src="./src/main.js"></script>
</body>

</html>
